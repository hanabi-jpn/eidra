version: "1"
proxy:
  listen: "127.0.0.1:8080"
  max_body_size: 10485760  # 10MB

scan:
  enabled: true
  custom_rules_path: ""

local_llm:
  enabled: false
  provider: ollama
  endpoint: "http://localhost:11434"
  model_mapping:
    default: "qwen2.5:latest"

mcp_gateway:
